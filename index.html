<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>وَقْت التَّسَوُّق - أَلْعاب</title>
    <style>
        @font-face { 
            font-family: 'Arakom'; 
            src: url('arakom.ttf') format('truetype'); 
        }
        
        :root {
            --primary: #0f4c5c; 
            --secondary: #e27d60; 
            --accent: #e8a87c;
            --text-main: #2d3748;
        }

        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }

        /* ALIŞVERİŞ KONSEPTİ */
        body {
            font-family: 'Arakom', 'Segoe UI', Tahoma, sans-serif; 
            background-color: #fdfbfb;
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(167, 243, 208, 0.7) 0%, transparent 50%), 
                radial-gradient(circle at 85% 75%, rgba(253, 230, 138, 0.6) 0%, transparent 50%), 
                radial-gradient(circle at 80% 20%, rgba(254, 204, 213, 0.6) 0%, transparent 50%), 
                radial-gradient(circle at 20% 80%, rgba(191, 219, 254, 0.7) 0%, transparent 50%); 
            background-attachment: fixed;
            color: var(--text-main); 
            min-height: 100vh; 
            display: flex;
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 2vh 2vw; 
            overflow-x: hidden; 
            position: relative;
        }

        /* --- ARKA PLAN SAYDAM EMOJİLER (ALIŞVERİŞ) --- */
        .floating-emojis {
            position: fixed;
            top: 0; left: 0; 
            width: 100vw; height: 100vh;
            pointer-events: none; 
            z-index: -2;
            overflow: hidden;
        }

        .floating-emojis span {
            position: absolute;
            opacity: 0.25; 
            animation: float ease-in-out infinite alternate;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            100% { transform: translateY(-20px) rotate(10deg) scale(1.05); }
        }

        /* Alışveriş Konseptli Agresif Küçülen Emojiler */
        .em-1 { top: 5%; left: 4%; font-size: clamp(2.5rem, 6vw, 5rem); animation-duration: 12s; animation-delay: 0s; } /* Sepet */
        .em-2 { top: 8%; right: 5%; font-size: clamp(3rem, 7vw, 6rem); animation-duration: 15s; animation-delay: -2s; } /* Para */
        .em-3 { top: 35%; left: 3%; font-size: clamp(2rem, 5vw, 4.5rem); animation-duration: 14s; animation-delay: -5s; } /* Çanta */
        .em-4 { top: 40%; right: 3%; font-size: clamp(3.5rem, 8vw, 6.5rem); animation-duration: 18s; animation-delay: -3s; } /* Hediye */
        .em-5 { top: 75%; left: 5%; font-size: clamp(3rem, 7vw, 5.5rem); animation-duration: 13s; animation-delay: -7s; } /* Ayakkabı */
        .em-6 { top: 72%; right: 6%; font-size: clamp(2.5rem, 6vw, 4.5rem); animation-duration: 16s; animation-delay: -1s; } /* Elbise */
        .em-7 { top: 18%; left: 15%; font-size: clamp(1.8rem, 4vw, 3.5rem); animation-duration: 11s; animation-delay: -4s; } /* Etiket */
        .em-8 { top: 22%; right: 12%; font-size: clamp(2rem, 5vw, 4rem); animation-duration: 17s; animation-delay: -6s; } /* Kahve */
        .em-9 { top: 88%; left: 18%; font-size: clamp(1.8rem, 4vw, 3.5rem); animation-duration: 14s; animation-delay: -2s; } /* Meyve */
        .em-10 { top: 85%; right: 20%; font-size: clamp(2.5rem, 6vw, 5rem); animation-duration: 19s; animation-delay: -8s; } /* Ekmek */
        .em-11 { top: 4%; left: 28%; font-size: clamp(3rem, 7vw, 5.5rem); animation-duration: 15s; animation-delay: -3s; } /* Tişört */
        .em-12 { top: 5%; right: 30%; font-size: clamp(2rem, 5vw, 4.5rem); animation-duration: 12s; animation-delay: -9s; } /* Kredi Kartı */

         .main-container {
            width: 100%;
            max-width: 950px; /* 3 kartın rahat sığması için 850'den 950'ye çıkarıldı */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(15px, 4vh, 45px);
            z-index: 10;
        }

        .header { 
            text-align: center; 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: clamp(15px, 4vw, 35px) clamp(15px, 6vw, 60px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 700px;
            position: relative;
        }

        /* --- BÜYÜTÜLMÜŞ ÜNİTE ROZETİ --- */
        .unit-badge {
            display: inline-block;
            background: linear-gradient(135deg, #0ba360 0%, #3cbab2 100%);
            color: white;
            padding: clamp(8px, 2vw, 12px) clamp(20px, 5vw, 40px); /* Daha dolgun padding */
            border-radius: 30px;
            font-size: clamp(1.4rem, 4vw, 2.2rem); /* Çok daha büyük font */
            font-weight: normal;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(11, 163, 96, 0.35);
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .header h1 { 
            font-size: clamp(1.8rem, 7vw, 4.5rem); 
            color: var(--primary); 
            line-height: 1.2;
            margin-bottom: 5px;
        }

        .header p { 
            color: var(--text-main); 
            font-size: clamp(0.9rem, 4vw, 1.6rem); 
            opacity: 0.8;
        }

        /* Kartlar İçin Agresif Esnek Izgara */
        .grid-container {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: stretch;
            width: 100%;
            gap: clamp(10px, 3vw, 25px); 
        }

        .game-card {
            position: relative;
            overflow: hidden; 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 1);
            border-radius: clamp(20px, 4vw, 30px); 
            padding: clamp(10px, 4vw, 25px); 
            text-align: center;
            text-decoration: none; 
            color: var(--primary); 
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(14, 165, 233, 0.04);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            
            /* --- YENİ EKLENEN/DEĞİŞEN KISIM --- */
            flex: 0 0 30%; /* Kartların esnemesini durdurup ilk satıra tam 3 adet sığdırır */
            max-width: 280px; /* Kartın aşırı büyümesini engeller */
            min-width: 200px; /* Kartın aşırı küçülmesini engeller */
            /* --------------------------------- */

            min-height: clamp(120px, 18vh, 190px);
            z-index: 1;
        }

        .game-card::before {
            content: attr(data-num);
            position: absolute;
            bottom: -5%;
            left: 3%; 
            font-size: clamp(4rem, 12vw, 10rem); 
            font-family: 'Georgia', 'Times New Roman', serif;
            font-style: italic;
            font-weight: 400;
            background: linear-gradient(135deg, rgba(15, 76, 92, 0.08), rgba(15, 76, 92, 0.01));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            z-index: -1; 
            line-height: 0.8;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .game-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 15px 40px rgba(11, 163, 96, 0.15);
            border-color: rgba(11, 163, 96, 0.4);
        }

        .game-card:hover::before {
            transform: translateY(-15px) scale(1.05) rotate(-5deg);
            background: linear-gradient(135deg, rgba(11, 163, 96, 0.2), rgba(11, 163, 96, 0.05));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .icon-circle {
            width: clamp(45px, 10vw, 85px); 
            height: clamp(45px, 10vw, 85px); 
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.5));
            border: 2px solid rgba(255,255,255,1);
            border-radius: clamp(15px, 4vw, 24px); 
            display: flex; 
            align-items: center;
            justify-content: center; 
            margin-bottom: clamp(8px, 2vw, 15px); 
            font-size: clamp(1.6rem, 5vw, 3.2rem); 
            box-shadow: 0 5px 15px rgba(0,0,0,0.06);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .game-card:hover .icon-circle {
            transform: scale(1.15) rotate(8deg);
            background: rgba(255, 255, 255, 1);
            border-color: #3cbab2;
        }

        .game-card h2 { 
            font-size: clamp(0.95rem, 8vw, 2.5rem); 
            font-weight: normal;
            line-height: 1.3;
        }

        /* MOBİL EKRANLAR */
        @media (max-width: 768px) {
            .game-card { 
                flex-basis: calc(50% - 10px);
            }
            .game-card::before {
                bottom: -8%;
            }
        }

        /* ÇOK DAR EKRANLAR */
        @media (max-width: 400px) {
            .game-card {
                flex-basis: 100%;
                max-width: 100%;
                min-height: 80px;
                flex-direction: row; 
                gap: 12px;
                padding: 12px 15px;
                justify-content: flex-start;
                text-align: right;
            }
            .icon-circle {
                margin-bottom: 0;
                flex-shrink: 0;
                width: 45px;
                height: 45px;
                font-size: 1.5rem;
                border-radius: 14px;
            }
            .game-card h2 {
                margin-top: 0;
                font-size: 1rem;
            }
            .game-card::before {
                left: 5%;
                bottom: -25%;
                font-size: 4.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Arka Plan Saydam Emojiler (Alışveriş) -->
    <div class="floating-emojis">
        <span class="em-1">🛒</span>
        <span class="em-2">💵</span>
        <span class="em-3">👜</span>
        <span class="em-4">🎁</span>
        <span class="em-5">👟</span>
        <span class="em-6">👗</span>
        <span class="em-7">🏷️</span>
        <span class="em-8">🛍️</span>
        <span class="em-9">🍎</span>
        <span class="em-10">🥖</span>
        <span class="em-11">👕</span>
        <span class="em-12">💳</span>
    </div>

    <div class="main-container">
        <div class="header">
            <span class="unit-badge">الوَحْدَة الثّانِيَة</span>
            <h1>وَقْت التَّسَوُّق</h1>
        </div>

        <div class="grid-container">

            <a href="yaz.html" class="game-card" data-num="1">
                <div class="icon-circle">✏️</div>
                <h2>تَرْتيب الحُروف</h2>
            </a>

            <a href="kelime.html" class="game-card" data-num="1">
                <div class="icon-circle">🎯</div>
                <h2>صَيْد الرُّموز</h2>
            </a>

            <a href="mukayese.html" class="game-card" data-num="2">
                <div class="icon-circle">⚖️</div>
                <h2>أَيُّهُما؟</h2>
            </a>

            <a href="alisveris.html" class="game-card" data-num="3">
                <div class="icon-circle">🛒</div>
                <h2>سوق المُفْرَدات</h2>
            </a>

            <a href="hafizakarti.html" class="game-card" data-num="4">
                <div class="icon-circle">🧠</div>
                <h2>لُعْبَة الذّاكِرَة</h2>
            </a>
        </div>
    </div>

</body>
</html>
