<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>التَّسَوُّق</title>
    <style>
        @font-face {
            font-family: 'Arakom';
            src: url('arakom.ttf') format('truetype');
        }

        :root {
            --paper: #fefae0;
            --ink: #283618;
            --highlight: #bc6c25;
            --lira-color: #c0392b;
            --wood: #6d4c41; 
            --wood-dark: #4e342e; 
            --awning-green: #606c38;
        }

        @keyframes pulse-btn {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(96, 108, 56, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(96, 108, 56, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(96, 108, 56, 0); }
        }

        body {
            font-family: 'Arakom', 'Tahoma', sans-serif;
            background: #ccd5ae;
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; margin: 0; padding: 0;
            overflow: hidden;
        }

        .back-btn {
            position: absolute; top: 10px; left: 10px;
            background: #606c38; color: white; padding: 8px 15px;
            border-radius: 12px; text-decoration: none; font-weight: normal;
            font-size: 1.2rem; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #game-wrapper {
            display: none; flex-direction: column; width: 95vw; height: 98vh; max-width: 1400px;
            gap: 15px; background: transparent; padding: 5px; border-radius: 0;
            box-sizing: border-box; border: none;
        }

        /* --- GELİŞTİRİLMİŞ MARKET STANDI TASARIMI --- */
        #shelf-section {
            flex: 1.8; 
            background: #e6c280; 
            padding: 50px 20px 20px 20px; 
            border: 12px solid var(--wood-dark); 
            border-radius: 10px;
            display: flex; flex-direction: column; 
            position: relative;
            box-shadow: inset 0 20px 30px rgba(0,0,0,0.15), 0 15px 30px rgba(0,0,0,0.25);
        }

        #shelf-section::before {
            content: ''; position: absolute; inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent, transparent 58px,
                rgba(0,0,0,0.06) 58px, rgba(0,0,0,0.06) 60px
            );
            pointer-events: none; z-index: 1;
        }

        .awning {
            position: absolute;
            top: -15px; left: -20px; right: -20px; 
            height: 40px;
            background: repeating-linear-gradient(
                to right,
                var(--awning-green), var(--awning-green) 50px,
                #fefae0 50px, #fefae0 100px
            );
            border-radius: 15px 15px 5px 5px;
            box-shadow: 0 12px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }
        
        .awning::after {
            content: ''; position: absolute;
            bottom: -8px; left: 0; right: 0; height: 8px;
            background: repeating-linear-gradient(
                to right,
                #4a5529, #4a5529 50px,
                #e5e1c8 50px, #e5e1c8 100px
            );
            border-radius: 0 0 50% 50%;
        }

        /* TENTEDEN ASILI AHŞAP TABELA */
        .market-title {
            position: relative;
            text-align: center; 
            font-size: 3.5vh; 
            margin: 5px auto 15px auto; 
            color: #fff;
            font-weight: normal;
            background: var(--wood-dark);
            display: inline-block;
            align-self: center;
            padding: 8px 40px;
            border-radius: 8px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            border: 4px solid #3e2723;
            z-index: 5;
            /* Harflerin bitişmesi için letter-spacing tamamen KALDIRILDI */
        }

        .market-title::before, .market-title::after {
            content: ''; position: absolute;
            top: -25px; 
            width: 5px; height: 25px;
            background: #212121;
            box-shadow: 1px 0 0 rgba(255,255,255,0.2);
            z-index: -1;
        }
        .market-title::before { left: 20px; }
        .market-title::after { right: 20px; }

        /* Scroll Olmayan 4x2 Izgara (Tam 8 Ürün) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            grid-template-rows: repeat(2, 1fr); 
            gap: 15px; 
            flex-grow: 1; 
            overflow: hidden; 
            z-index: 2; 
        }

        .product-card {
            background: white; border-radius: 10px; padding: 5px;
            text-align: center; cursor: pointer; transition: 0.3s;
            border: 2px solid #fff; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.15); 
            display: flex; flex-direction: column; justify-content: center;
            align-items: center;
        }

        .product-card:hover {
            transform: translateY(-5px) scale(1.02); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.25); 
            border-color: var(--highlight);
        }

        .product-card.selected { opacity: 0.1; pointer-events: none; transform: scale(0.9); }
        .emoji-big { font-size: 7vh; display: block; margin-bottom: 5px; }
        .price-ar { font-size: 5vh; color: var(--lira-color); font-weight: normal; }

        /* --- ALIŞVERİŞ LİSTESİ: BAĞIMSIZ, DÜZ KAĞIT --- */
        #mom-paper {
            flex: 0 0 30% !important; max-width: 30%; 
            display: flex; flex-direction: column;
            background: #fdf8e4 !important; 
            border: 1px solid #e5dcb5 !important;
            box-shadow: 6px 8px 20px rgba(0,0,0,0.12) !important; 
            padding: 20px 15px; box-sizing: border-box;
            overflow: hidden !important; 
            position: relative;
            transform: rotate(0deg); /* Eğim kaldırıldı, tamamen düz yapıldı */
            border-radius: 2px !important; 
            align-self: center; 
            height: 88%; 
            margin-left: 20px; 
        }

        .shopping-list { 
            list-style: none; padding: 0; margin: 0; width: 100%;
            overflow: hidden !important;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; flex: 1;
        }

        @keyframes breathing-text {
            0% { transform: scale(1); text-shadow: 0 0 0px rgba(188, 108, 37, 0); }
            50% { transform: scale(1.15); text-shadow: 0 0 15px rgba(188, 108, 37, 0.3); }
            100% { transform: scale(1); text-shadow: 0 0 0px rgba(188, 108, 37, 0); }
        }

        .shopping-list li {
            width: 100%; padding: 12px 0; margin-bottom: 8px;
            text-align: center; transition: all 0.3s ease;
            font-size: 6.5vh; color: var(--ink);
            opacity: 0.6; white-space: nowrap; 
        }

        .shopping-list li.active {
            color: #bc6c25 !important; font-weight: 500 !important;
            opacity: 1 !important; display: inline-block; 
            animation: breathing-text 2s ease-in-out infinite;
        }

        .shopping-list li.done {
            text-decoration: line-through; opacity: 0.15; transform: scale(0.9); animation: none; 
        }

        .total-display {
            font-size: 4.5vh; font-weight: 400; color: var(--lira-color);
            margin: 5px 0 0 0; padding: 10px 30px;
            border-radius: 12px; transition: all 0.3s ease;
            display: inline-block; cursor: default;
            background: white; border: 3px solid var(--wood-dark);
            z-index: 2; position: relative;
        }

        .total-display.ready-to-pay {
            background: var(--highlight); color: white; cursor: pointer;
            animation: pulse-btn 1.5s infinite; border-color: white;
            box-shadow: 0 5px 15px rgba(188, 108, 37, 0.4);
        }

        /* --- FATURA MODAL (BOYUTU VE YAZILARI DÜZENLENDİ) --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }

        .receipt-paper {
            width: 85% !important; max-width: 500px !important;
            height: auto !important; /* Ekranı tam kaplamaması için auto yapıldı */
            max-height: 90vh !important;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 40px 30px !important; border: 4px solid #333 !important;
            background: #fff; border-radius: 15px !important; text-align: center;
        }

        #modal h2 { font-size: 6.5vh !important; margin: 10px 0 20px 0 !important; font-weight: 500; color: #000; }
        #receipt-details { font-size: 5vh !important; font-weight: normal; color: #444; margin: 15px 0; }
        
        .receipt-total {
            font-size: 11vh !important; /* Yazı devasa yapıldı */
            border-top: 6px dashed #000 !important;
            border-bottom: 6px dashed #000 !important; padding: 20px 0 !important;
            margin: 20px 0 !important; width: 100%; color: #c0392b; font-weight: 400;
        }

        #options-grid { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        
        .opt {
            font-size: 5.5vh !important; /* Şıklar çok daha büyük */
            padding: 15px 0 !important;
            border-bottom: 5px dashed #606c38 !important; background: #f9f9f9 !important;
            font-weight: 400 !important; width: 100%; border: 4px solid #606c38; 
            border-radius: 15px; cursor: pointer; font-family: 'Arakom';
            animation: pulse-btn 1.5s infinite; 
        }

        .opt:hover { background: #f1f3ed !important; border-color: #bc6c25 !important; color: #bc6c25 !important; }

        /* --- DİĞER --- */
        #landing-page { position: fixed; inset: 0; background: #ccd5ae; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; text-align: center; }
        .welcome-card { background: white; padding: 50px; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); max-width: 500px; width: 90%; }
        .welcome-card h1 { color: #283618; font-size: 8vh; margin: 20px 0; }
        .welcome-card .main-icon { font-size: 12vh; }
        .start-btn { display: inline-block; padding: 15px 50px; background: #606c38; color: white; border: none; font-size: 4vh; border-radius: 15px; font-weight: normal; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 0 #283618; font-family: 'Arakom', 'Tahoma', sans-serif; }
        .start-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #283618; }
        /* #instruction-header CSS moved to inline for popup */
        
        .custom-alert { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: var(--paper); border: 5px solid var(--ink); padding: 25px; border-radius: 15px; z-index: 2000; text-align: center; box-shadow: 0 0 0 1000px rgba(0,0,0,0.7); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); min-width: 280px; }
        .custom-alert.show { transform: translate(-50%, -50%) scale(1); }
        .custom-alert h2 { font-size: 3.5vh; margin: 0 0 15px 0; color: var(--ink); }
        .custom-alert button { background: var(--highlight); color: white; border: none; padding: 12px 30px; font-size: 2.8vh; border-radius: 8px; cursor: pointer; font-family: 'Arakom'; box-shadow: 0 4px 0 #8d521d; }
    
        /* --- CİHAZ DÖNDÜRME UYARISI VE MOBİL YATAY KLAVYE DESTEĞİ --- */
        #rotate-message {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #2c3e50; 
            z-index: 99999; 
            flex-direction: column;
            align-items: center; justify-content: center;
            color: white; text-align: center;
        }
        .phone-animation {
            width: 60px; height: 100px;
            border: 4px solid white; border-radius: 10px;
            animation: rotate-phone 2s infinite ease-in-out;
            margin-bottom: 20px; position: relative;
        }
        .phone-animation::before {
            content: ''; position: absolute;
            top: 10px; left: 50%; transform: translateX(-50%);
            width: 20%; height: 4px; background: white; border-radius: 2px;
        }
        @keyframes rotate-phone {
            0% { transform: rotate(0deg); opacity: 1; }
            25% { transform: rotate(90deg); opacity: 1; }
            70% { transform: rotate(90deg); opacity: 1; }
            100% { transform: rotate(90deg); opacity: 0; }
        }
        .rotate-text { font-size: 2.5rem; font-family: 'Arakom', Tahoma, sans-serif; }

        /* Rotate mesajı kaldırıldı */

        @media screen and (max-height: 500px) {
            body {
                overflow-y: auto !important;
                height: auto !important;
                min-height: 100dvh;
                align-items: flex-start;
                padding-top: 15px; padding-bottom: 15px;
            }
        }

    /* Mobil (800px altı) Kapsamlı Düzenlemeler */
@media (max-width: 800px) {
    /* Genel oyun konteyneri */
    .main-game-area { flex-direction: row-reverse !important; gap: 5px !important; padding: 5px !important; justify-content: flex-start !important; }
    
    /* Raf Bölümü */
    #shelf-section { flex: 0 0 65% !important; max-width: 65% !important; width: 65% !important; margin: 0 !important; padding: 2px !important; }
    .awning { min-height: 20px !important; background-size: 30px 100% !important; margin-bottom: 5px !important; }
    .market-title { font-size: 2vh !important; padding: 5px 20px !important; margin: 0 auto 5px auto !important; }
    .market-title::before, .market-title::after { top: -15px !important; height: 15px !important; }
    
    /* Ürün Izgarası ve Kartlar */
    .grid { gap: 5px !important; grid-template-rows: repeat(2, minmax(60px, 1fr)) !important; }
    .product-card { padding: 2px !important; border-width: 1px !important; }
    .emoji-big { font-size: 4.5vh !important; margin-bottom: 2px !important; }
    .price-ar { font-size: 3vh !important; }
    
    /* Fiş / Hesap Alanı */
    #status-bar { padding-top: 5px !important; }
    .total-display { font-size: 3.5vh !important; padding: 5px 20px !important; }
    
    /* Alışveriş Listesi (Annemin Listesi) */
    #mom-paper { flex: 0 0 35% !important; max-width: 35% !important; width: 35% !important; height: 95% !important; margin: 0 !important; padding: 5px !important; }
    #mom-paper > div { font-size: 4vh !important; padding-bottom: 5px !important; margin-bottom: 5px !important; }
    .shopping-list { flex-direction: column !important; flex-wrap: nowrap !important; gap: 2px !important; justify-content: center !important; }
    .shopping-list li { width: auto !important; padding: 5px 10px !important; font-size: 3.5vh !important; margin-bottom: 0 !important; }
    
    /* Başlangıç Ekranı */
    #landing-page h1 { font-size: clamp(3rem, 10vw, 5rem) !important; margin-bottom: 10px !important; }
    #landing-page p { font-size: clamp(1.5rem, 5vw, 2.5rem) !important; }
    .start-btn { width: 90% !important; max-width: 350px !important; margin: 0 auto !important; padding: 15px !important; font-size: clamp(2.5rem, 8vw, 4rem) !important; }
}
</style>
</head>

        <script>
        // --- FULLSCREEN API ---
        function goFullscreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => console.log(err));
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen().catch(err => console.log(err));
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen().catch(err => console.log(err));
            }
        }

        function exitFullscreen() {
            if (document.exitFullscreen) {
                document.exitFullscreen().catch(err => console.log(err));
            } else if (document.webkitExitFullscreen) { /* Safari */
                document.webkitExitFullscreen().catch(err => console.log(err));
            } else if (document.msExitFullscreen) { /* IE11 */
                document.msExitFullscreen().catch(err => console.log(err));
            }
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSineWave(freq, duration) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function startGame() {
            goFullscreen();
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('game-wrapper').style.display = 'flex';
            
            // Yönergeyi ortada göster ve 3 sn sonra kaybet
            const inst = document.getElementById('instruction-header');
            if(inst) {
                inst.style.display = 'block';
                inst.style.opacity = '1';
                setTimeout(() => { inst.style.opacity = '0'; }, 3000);
            }
            playYonerge();
        }

        const toAr = (n) => n.toString().replace(/\d/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
        let audioPlayed = false;

        function playYonerge() {
            if (!audioPlayed) {
                const audio = document.getElementById('yonergeAudio');
                if(audio) audio.play().catch(()=>{});
                audioPlayed = true;
            }
        }

        const allProducts = [

            { name: 'خُبْز', icon: '🍞', price: 1 }, { name: 'زُبْدَة', icon: '🧈', price: 4 },
            { name: 'عَسَل', icon: '🍯', price: 3 }, { name: 'بَيْض', icon: '🥚', price: 2 },
            { name: 'أُرْز', icon: '🍚', price: 3 }, { name: 'لَحْم', icon: '🥩', price: 5 },
            { name: 'حَساء', icon: '🥣', price: 4 }, { name: 'دَجاج', icon: '🍗', price: 4 },
            { name: 'سَمَك', icon: '🐟', price: 4 }, { name: 'كُفْتَة', icon: '🧆', price: 5 }, { name: 'ماء', icon: '💧', price: 1 },
            { name: 'حَليب', icon: '🥛', price: 3 }, { name: 'عَصير', icon: '🧃', price: 2 }, 
            { name: 'قَهْوَة', icon: '☕', price: 3 }, { name: 'مِلْعَقَة', icon: '🥄', price: 1 },
            { name: 'تُفّاح', icon: '🍎', price: 2 }, { name: 'مَوْز', icon: '🍌', price: 3 },
            { name: 'جَزَر', icon: '🥕', price: 1 }
        ];

        const numWords = {
            1: "واحِد", 2: "اِثْنان", 3: "ثَلاثَة", 4: "أَرْبَعَة", 5: "خَمْسَة",
            6: "سِتَّة", 7: "سَبْعَة", 8: "ثَمانِيَة", 9: "تِسْعَة", 10: "عَشَرَة",
            11: "أَحَد عَشَر", 12: "اِثْنا عَشَر", 13: "ثَلاثَة عَشَر", 14: "أَرْبَعَة عَشَر", 15: "خَمْسَة عَشَر"
        };

        let targetList = [];
        let currentTaskIndex = 0;
        let total = 0;
        let selectedProducts = [];
        let availablePool = []; 
        let alertCallback = null;

        function initGame() {
            if (availablePool.length < 5) availablePool = [...allProducts];
            availablePool.sort(() => 0.5 - Math.random());

            targetList = [];
            let poolCopy = [...availablePool];
            for (let i = 0; i < poolCopy.length; i++) {
                if (targetList.length >= 3) break;
                let product = poolCopy[i];
                const isTeaOrCoffee = (product.name === 'شاي' || product.name === 'قَهْوَة');
                const alreadyHasOne = targetList.some(p => p.name === 'شاي' || p.name === 'قَهْوَة');
                
                if (isTeaOrCoffee && alreadyHasOne) continue;
                
                targetList.push(product);
                let indexInPool = availablePool.indexOf(product);
                if (indexInPool > -1) availablePool.splice(indexInPool, 1);
            }

            currentTaskIndex = 0;
            total = 0;
            selectedProducts = [];
            
            const totalContainer = document.getElementById('total-container');
            totalContainer.classList.remove('ready-to-pay');
            totalContainer.innerHTML = `<span dir="ltr"><span id="total-val">${toAr(0)}</span> ₺</span>`;

            document.getElementById('target-list').innerHTML = targetList.map((p, i) => `<li id="task-${i}">${p.name}</li>`).join('');
            
            const shelf = document.getElementById('shelf');
            shelf.innerHTML = ''; 
            
            let otherProducts = allProducts.filter(p => !targetList.find(t => t.name === p.name));
            let shelfProducts = [...targetList, ...otherProducts.sort(() => 0.5 - Math.random()).slice(0, 5)].sort(() => 0.5 - Math.random());
            
            shelfProducts.forEach((p) => {
                const div = document.createElement('div');
                div.className = 'product-card';
                div.innerHTML = `<span class="emoji-big">${p.icon}</span><span class="price-ar" dir="ltr">${toAr(p.price)} ₺</span>`;
                div.onclick = () => handleSelection(p, div);
                shelf.appendChild(div);
            });
            updateHighlight();
        }

        function handleSelection(product, element) {
            if (product.name === targetList[currentTaskIndex].name) {
                playSineWave(880, 0.2); 
                
                total += product.price;
                selectedProducts.push(product);
                element.classList.add('selected');
                currentTaskIndex++;
                document.getElementById('total-val').innerText = toAr(total);
                updateHighlight();

                if (currentTaskIndex === targetList.length) {
                    const container = document.getElementById('total-container');
                    container.classList.add('ready-to-pay');
                    container.innerHTML = "دَفْع الفاتورَة 💰";
                }
            } else {
                playSineWave(200, 0.3); 
                element.style.transform = "translateX(10px)";
                setTimeout(() => element.style.transform = "translateX(0)", 100);
            }
        }

        function checkAndOpenCheckout() {
            if (currentTaskIndex === targetList.length) {
                const cashAudio = document.getElementById('snd-cash');
                if(cashAudio) {
                    cashAudio.currentTime = 0;
                    cashAudio.play().catch(()=>{});
                }
                openCheckout();
            }
        }

        function openCheckout() {
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('num-display').innerText = toAr(total) + " ₺";
    
    
    // Fatura ekranında alttaki yazılı şıklar (TL simgesi solda olacak şekilde)
let choices = [
    { t: `<span dir="ltr">₺ ${numWords[total] || toAr(total)}</span>`, c: true },
    { t: `<span dir="ltr">₺ ${numWords[total+2] || toAr(total+2)}</span>`, c: false },
    { t: `<span dir="ltr">₺ ${numWords[Math.abs(total-1) || 7]}</span>`, c: false }
].sort(() => 0.5 - Math.random());

    const optGrid = document.getElementById('options-grid');
    optGrid.innerHTML = '';
    choices.forEach(ch => {
        const b = document.createElement('button');
        b.className = 'opt';
        
        // DİKKAT: innerText yerine innerHTML kullanıyoruz ki span etiketi çalışsın
        b.innerHTML = ch.t; 
        
        b.onclick = () => {
            if(ch.c) {
                playSineWave(523, 0.1); 
                setTimeout(() => playSineWave(659, 0.1), 100);
                setTimeout(() => playSineWave(783, 0.3), 200);

                showMessage("أَحْسَنْت! ✅", () => {
                    document.getElementById('modal').style.display = 'none'; 
                    initGame(); 
                });
            } else {
                playSineWave(200, 0.4); 
                showMessage("حاوِلْ مَرَّة أُخْرى ❌"); 
            }
        };
        optGrid.appendChild(b);
    });
}

        function updateHighlight() {
            targetList.forEach((_, i) => {
                const el = document.getElementById(`task-${i}`);
                if (el) {
                    if (i === currentTaskIndex) el.className = 'active';
                    else if (i < currentTaskIndex) el.className = 'done';
                    else el.className = '';
                }
            });
        }

        function showMessage(text, callback = null) {
            document.getElementById('alert-text').innerText = text;
            document.getElementById('custom-alert').classList.add('show');
            alertCallback = callback;
        }

        function closeCustomAlert() {
            document.getElementById('custom-alert').classList.remove('show');
            if (alertCallback) alertCallback();
        }

        initGame();
    </script>
</body>
</html>
